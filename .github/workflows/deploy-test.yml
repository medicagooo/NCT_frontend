name: Deploy Test Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-test.yml"
      - "blog/**"
      - "config/**"
      - "frontend/**"
      - "public/**"
      - "scripts/**"
      - "tests/**"
      - "index.html"
      - "package-lock.json"
      - "package.json"
      - "vite.config.js"
      - "wrangler.test.toml"

concurrency:
  group: nct-frontend-test
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      HAS_CLOUDFLARE_SECRETS: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_API_TOKEN != '' }}
      VITE_NCT_API_SQL_PUBLIC_DATA_URL: ${{ vars.TEST_NCT_API_SQL_PUBLIC_DATA_URL }}
      VITE_NCT_SUB_FORM_URL: ${{ vars.TEST_NCT_SUB_FORM_URL }}
    steps:
      - name: Skip when Cloudflare secrets are absent
        if: env.HAS_CLOUDFLARE_SECRETS != 'true'
        run: echo "Cloudflare GitHub secrets are not configured; skipping test deploy."

      - name: Checkout
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        run: npm ci

      - name: Test and build
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        run: npm test

      - name: Deploy test frontend
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        run: npx wrangler deploy --config wrangler.test.toml --keep-vars
